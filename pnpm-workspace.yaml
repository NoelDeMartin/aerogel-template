allowBuilds:
    core-js: true
    vue-demi: true
catalog:
    '@noeldemartin/solid-utils': next
    'soukai-bis': next
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vite-plus: latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest
overrides:
    '@noeldemartin/solid-utils': 'catalog:'
    soukai-bis: 'catalog:'
    vite: 'catalog:'
    vitest: 'catalog:'
peerDependencyRules:
    allowAny:
        - vite
        - vitest
    allowedVersions:
        vite: '*'
        vitest: '*'
